<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Organic — AI Content Studio</title>
  <meta name="description" content="Organic feeling content generation for organic traffic. AI content studio with a built-in brand engine, multi-model fact-checking, and automatic humanization." />

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />

  <!-- ABCArizona Flare (self-hosted) -->
  <style>
    @font-face {
      font-family: 'ABCArizona';
      src: url('fonts/ABCArizonaText-Thin-Trial.otf') format('opentype');
      font-weight: 100;
      font-style: normal;
      font-display: swap;
    }
    @font-face {
      font-family: 'ABCArizona';
      src: url('fonts/ABCArizonaText-ThinItalic-Trial.otf') format('opentype');
      font-weight: 100;
      font-style: italic;
      font-display: swap;
    }
    @font-face {
      font-family: 'ABCArizona';
      src: url('fonts/ABCArizonaText-Light-Trial.otf') format('opentype');
      font-weight: 300;
      font-style: normal;
      font-display: swap;
    }
    @font-face {
      font-family: 'ABCArizona';
      src: url('fonts/ABCArizonaText-LightItalic-Trial.otf') format('opentype');
      font-weight: 300;
      font-style: italic;
      font-display: swap;
    }
    @font-face {
      font-family: 'ABCArizona';
      src: url('fonts/ABCArizonaText-Regular-Trial.otf') format('opentype');
      font-weight: 400;
      font-style: normal;
      font-display: swap;
    }
    @font-face {
      font-family: 'ABCArizona';
      src: url('fonts/ABCArizonaText-RegularItalic-Trial.otf') format('opentype');
      font-weight: 400;
      font-style: italic;
      font-display: swap;
    }
    @font-face {
      font-family: 'ABCArizona';
      src: url('fonts/ABCArizonaText-Medium-Trial.otf') format('opentype');
      font-weight: 500;
      font-style: normal;
      font-display: swap;
    }
    @font-face {
      font-family: 'ABCArizona';
      src: url('fonts/ABCArizonaText-MediumItalic-Trial.otf') format('opentype');
      font-weight: 500;
      font-style: italic;
      font-display: swap;
    }
    @font-face {
      font-family: 'ABCArizona';
      src: url('fonts/ABCArizonaText-Bold-Trial.otf') format('opentype');
      font-weight: 700;
      font-style: normal;
      font-display: swap;
    }
    @font-face {
      font-family: 'ABCArizona';
      src: url('fonts/ABCArizonaText-BoldItalic-Trial.otf') format('opentype');
      font-weight: 700;
      font-style: italic;
      font-display: swap;
    }
  </style>

  <!-- React 18 UMD -->
  <script crossorigin src="https://unpkg.com/react@18.2.0/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18.2.0/umd/react-dom.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/@babel/standalone@7.23.9/babel.min.js"></script>

  <style>
    /* ─── Reset ─── */
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    /* ─── Tokens ─── */
    :root {
      --bg: #F8F8F7;
      --ink: #120801;
      --primary: #3a4a2f;
      --muted: #8a8474;
      --border: rgba(18, 8, 1, 0.14);
      --border-strong: rgba(18, 8, 1, 0.30);
      --font-display: 'ABCArizona', Georgia, serif;
      --font-body: 'Inter', sans-serif;
      --font-mono: 'JetBrains Mono', monospace;
      --max-w: 1440px;
      --px: 64px;
    }

    html { scroll-behavior: smooth; }

    body {
      background: var(--bg);
      color: var(--ink);
      font-family: var(--font-body);
      font-size: 16px;
      line-height: 1.6;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    /* ─── Utility ─── */
    .container { max-width: var(--max-w); margin: 0 auto; padding: 0 var(--px); }
    .eyebrow {
      font-family: var(--font-mono);
      font-size: 11px;
      font-weight: 500;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--primary);
    }
    .section-border { border-top: 1px solid var(--border); }

    /* ─── Nav ─── */
    .nav { padding: 24px 0; }
    .nav-inner { display: flex; align-items: center; justify-content: space-between; }
    .nav-logo { display: flex; align-items: center; gap: 10px; text-decoration: none; color: var(--ink); }
    .nav-logo-text { font-family: var(--font-display); font-size: 22px; font-weight: 500; }
    .nav-links { display: flex; align-items: center; gap: 32px; }
    .nav-link {
      font-family: var(--font-body);
      font-size: 14px;
      font-weight: 400;
      color: var(--ink);
      text-decoration: none;
      transition: color 0.2s;
    }
    .nav-link:hover { color: var(--primary); }
    .nav-actions { display: flex; align-items: center; gap: 16px; }
    .nav-signin {
      font-size: 14px;
      color: var(--muted);
      text-decoration: none;
      transition: color 0.2s;
    }
    .nav-signin:hover { color: var(--ink); }

    /* ─── Buttons ─── */
    .btn-primary {
      display: inline-flex; align-items: center; gap: 6px;
      padding: 12px 24px;
      background: var(--ink);
      color: var(--bg);
      font-family: var(--font-body);
      font-size: 14px;
      font-weight: 500;
      border: none;
      cursor: pointer;
      text-decoration: none;
      transition: opacity 0.2s;
    }
    .btn-primary:hover { opacity: 0.85; }

    .btn-secondary {
      display: inline-flex; align-items: center; gap: 6px;
      padding: 12px 24px;
      background: transparent;
      color: var(--ink);
      font-family: var(--font-body);
      font-size: 14px;
      font-weight: 500;
      border: 1px solid var(--border-strong);
      cursor: pointer;
      text-decoration: none;
      transition: border-color 0.2s, color 0.2s;
    }
    .btn-secondary:hover { border-color: var(--ink); }

    .btn-moss {
      display: inline-flex; align-items: center; gap: 6px;
      padding: 12px 24px;
      background: var(--primary);
      color: var(--bg);
      font-family: var(--font-body);
      font-size: 14px;
      font-weight: 500;
      border: none;
      cursor: pointer;
      text-decoration: none;
      transition: opacity 0.2s;
    }
    .btn-moss:hover { opacity: 0.9; }

    /* ─── Hero ─── */
    .hero { padding: 120px 0 0; }
    .hero-grid { display: grid; grid-template-columns: 1.1fr 1fr; gap: 64px; align-items: start; }
    .hero-headline {
      font-family: var(--font-display);
      font-size: 64px;
      font-weight: 300;
      line-height: 1.0;
      letter-spacing: -0.06em;
      margin: 20px 0 28px;
    }
    .hero-headline em {
      font-style: italic;
      color: var(--ink);
    }
    .hero-lede {
      font-size: 19px;
      line-height: 1.6;
      color: var(--ink);
      max-width: 520px;
      margin-bottom: 32px;
    }
    .hero-ctas { display: flex; gap: 12px; margin-bottom: 72px; }
    .hero-stats {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 0;
      border-top: 1px solid var(--border);
      border-bottom: 1px solid var(--border);
      padding: 36px 0;
      margin-bottom: 72px;
    }
    .hero-stat {
      padding: 0 24px;
      border-right: 1px solid var(--border);
    }
    .hero-stat:first-child { padding-left: 0; }
    .hero-stat:last-child { border-right: none; padding-right: 0; }
    .hero-stat-number {
      font-family: var(--font-display);
      font-size: 42px;
      font-weight: 300;
      color: var(--primary);
      line-height: 1;
      letter-spacing: -0.02em;
    }
    .hero-stat-label {
      font-family: var(--font-mono);
      font-size: 11px;
      font-weight: 400;
      letter-spacing: 1px;
      text-transform: uppercase;
      color: var(--muted);
      margin-top: 8px;
    }

    /* ─── Terminal ─── */
    .terminal {
      background: #1a1a1a;
      border: 1px solid rgba(255,255,255,0.08);
      overflow: hidden;
    }
    .terminal-chrome {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 14px 18px;
      background: #222;
      border-bottom: 1px solid rgba(255,255,255,0.06);
    }
    .terminal-dot {
      width: 12px; height: 12px; border-radius: 50%;
    }
    .terminal-dot--red { background: #c47a5a; }
    .terminal-dot--yellow { background: #c9a84c; }
    .terminal-dot--green { background: #5a7a4a; }
    .terminal-title {
      font-family: var(--font-mono);
      font-size: 12px;
      color: rgba(255,255,255,0.4);
      margin-left: 8px;
    }
    .terminal-body {
      padding: 20px;
      font-family: var(--font-mono);
      font-size: 13px;
      line-height: 1.65;
      color: rgba(255,255,255,0.7);
      min-height: 320px;
    }
    .terminal-line { white-space: pre; }
    .terminal-line--dim { color: rgba(255,255,255,0.3); }
    .terminal-line--green { color: #7aad5a; }
    .terminal-line--amber { color: #c9a84c; }
    .terminal-cursor {
      display: inline-block;
      color: rgba(255,255,255,0.7);
      animation: blink 1s step-end infinite;
    }
    @keyframes blink { 0%,100% { opacity: 1; } 50% { opacity: 0; } }

    /* ─── Section header grid ─── */
    .section-header {
      display: grid;
      grid-template-columns: 280px 1fr;
      gap: 32px;
      margin-bottom: 72px;
      align-items: start;
    }
    .section-headline {
      font-family: var(--font-display);
      font-size: 48px;
      font-weight: 300;
      line-height: 1.1;
      letter-spacing: -0.04em;
    }
    .section-headline em { font-style: italic; color: var(--ink); }

    /* ─── Why Organic ─── */
    .why { padding: 140px 0; }
    .why-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 0;
      border-top: 1px solid var(--border);
    }
    .why-card {
      padding: 32px 32px 40px 24px;
      border-right: 1px solid var(--border);
    }
    .why-card:last-child { border-right: none; padding-right: 0; }
    .why-card-number {
      font-family: var(--font-mono);
      font-size: 11px;
      font-weight: 500;
      letter-spacing: 2px;
      color: var(--muted);
      margin-bottom: 12px;
    }
    .why-card-title {
      font-family: var(--font-display);
      font-size: 26px;
      font-weight: 400;
      color: var(--primary);
      margin-bottom: 12px;
      line-height: 1.2;
    }
    .why-card-body {
      font-size: 15px;
      line-height: 1.6;
      color: var(--muted);
    }

    /* ─── Pipeline ─── */
    .pipeline { padding: 140px 0; }
    .pipeline-row {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 0;
      border-top: 1px solid var(--border);
      border-bottom: 1px solid var(--border);
    }
    .pipeline-step {
      padding: 32px 24px;
      border-right: 1px solid var(--border);
    }
    .pipeline-step:last-child { border-right: none; }
    .pipeline-step-number {
      font-family: var(--font-mono);
      font-size: 11px;
      font-weight: 500;
      letter-spacing: 2px;
      color: var(--muted);
      margin-bottom: 10px;
    }
    .pipeline-step-name {
      font-family: var(--font-display);
      font-size: 22px;
      font-weight: 400;
      color: var(--primary);
      margin-bottom: 8px;
      line-height: 1.3;
    }
    .pipeline-step-body {
      font-size: 14px;
      line-height: 1.5;
      color: var(--muted);
      margin-bottom: 16px;
    }
    .pipeline-chip {
      display: inline-block;
      font-family: var(--font-mono);
      font-size: 11px;
      letter-spacing: 0.5px;
      padding: 4px 10px;
      border: 1px solid var(--border-strong);
      color: var(--muted);
      margin-right: 6px;
      margin-bottom: 6px;
    }

    /* ─── Before / After ─── */
    .beforeafter { padding: 140px 0; }
    .slider-container {
      position: relative;
      overflow: hidden;
      border: 1px solid var(--border);
      user-select: none;
      cursor: col-resize;
    }
    .slider-side {
      padding: 48px 56px;
      min-height: 340px;
    }
    .slider-after {
      background: #F0F0EF;
    }
    .slider-before-wrap {
      position: absolute;
      top: 0; left: 0;
      height: 100%;
      overflow: hidden;
      border-right: 2px solid var(--ink);
      z-index: 2;
    }
    .slider-before {
      background: var(--bg);
      padding: 48px 56px;
      min-height: 340px;
      width: 100%;
    }
    .slider-label {
      font-family: var(--font-mono);
      font-size: 11px;
      font-weight: 500;
      letter-spacing: 2px;
      text-transform: uppercase;
      margin-bottom: 20px;
    }
    .slider-label--before { color: var(--muted); }
    .slider-label--after { color: var(--primary); }
    .slider-text {
      font-family: Georgia, 'Times New Roman', serif;
      font-size: 18px;
      line-height: 1.75;
      max-width: 560px;
    }
    .slider-text--before { font-style: italic; color: var(--muted); }
    .slider-text--after { font-style: normal; color: var(--ink); }
    .slider-tags { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 20px; }
    .slider-tag {
      font-family: var(--font-mono);
      font-size: 11px;
      letter-spacing: 0.5px;
      padding: 4px 10px;
    }
    .slider-tag--clay {
      border: 1px solid #c47a5a;
      color: #c47a5a;
    }
    .slider-tag--moss {
      background: var(--primary);
      color: var(--bg);
      border: 1px solid var(--primary);
    }
    .slider-handle {
      position: absolute;
      top: 0;
      width: 2px;
      height: 100%;
      z-index: 3;
      pointer-events: none;
    }
    .slider-knob {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 40px; height: 40px;
      background: var(--ink);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      pointer-events: none;
    }
    .slider-knob svg { color: var(--bg); }

    /* ─── Pricing ─── */
    .pricing { padding: 140px 0; }
    .pricing-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 0;
      border: 1px solid var(--border);
    }
    .pricing-tier {
      padding: 40px 36px;
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
    }
    .pricing-tier:last-child { border-right: none; }
    .pricing-tier--featured {
      background: var(--primary);
      color: var(--bg);
      border-color: var(--primary);
    }
    .pricing-tier--featured .pricing-eyebrow { color: rgba(248, 248, 247, 0.6); }
    .pricing-tier--featured .pricing-price { color: var(--bg); }
    .pricing-tier--featured .pricing-period { color: rgba(248, 248, 247, 0.5); }
    .pricing-tier--featured .pricing-feature { color: rgba(248, 248, 247, 0.8); border-color: rgba(248, 248, 247, 0.15); }
    .pricing-tier--featured .btn-primary { background: var(--bg); color: var(--primary); }
    .pricing-tier--featured .btn-primary:hover { opacity: 0.9; }
    .pricing-eyebrow {
      font-family: var(--font-mono);
      font-size: 11px;
      font-weight: 500;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 20px;
    }
    .pricing-price {
      font-family: var(--font-display);
      font-size: 54px;
      font-weight: 400;
      line-height: 1;
      color: var(--ink);
    }
    .pricing-period {
      font-family: var(--font-body);
      font-size: 14px;
      color: var(--muted);
      margin-top: 4px;
    }
    .pricing-per-article {
      font-family: var(--font-mono);
      font-size: 13px;
      color: var(--muted);
      margin-top: 6px;
      margin-bottom: 32px;
    }
    .pricing-tier--featured .pricing-per-article { color: rgba(248, 248, 247, 0.5); }
    .pricing-eyebrow-badge {
      display: inline-block;
      font-family: var(--font-mono);
      font-size: 9px;
      font-weight: 600;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      background: var(--primary);
      color: var(--bg);
      padding: 3px 8px;
      margin-left: 8px;
      vertical-align: middle;
    }
    .pricing-tier--featured .pricing-eyebrow-badge {
      background: var(--bg);
      color: var(--primary);
    }
    .pricing-features {
      list-style: none;
      flex: 1;
      margin-bottom: 32px;
    }
    .pricing-feature {
      font-size: 14px;
      line-height: 1.5;
      padding: 12px 0;
      border-top: 1px solid var(--border);
    }
    .pricing-cta { margin-top: auto; }

    /* ─── Final CTA ─── */
    .final-cta {
      padding: 160px 0;
      text-align: center;
      background: var(--ink);
      color: var(--bg);
      border-top: none;
    }
    .final-cta-headline {
      font-family: var(--font-display);
      font-size: 88px;
      font-weight: 300;
      line-height: 1.05;
      letter-spacing: -0.04em;
      max-width: 900px;
      margin: 0 auto 28px;
      color: var(--bg);
    }
    .final-cta-headline em { font-style: italic; color: rgba(248, 248, 247, 0.5); }
    .final-cta-lede {
      font-size: 19px;
      color: rgba(248, 248, 247, 0.5);
      margin-bottom: 36px;
    }
    .final-cta .btn-primary {
      background: var(--bg);
      color: var(--ink);
    }

    /* ─── Footer ─── */
    .footer {
      padding: 48px 0;
      background: var(--ink);
      border-top: none;
    }
    .footer-inner {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .footer-left, .footer-right {
      font-family: var(--font-mono);
      font-size: 11px;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      color: rgba(248, 248, 247, 0.5);
    }
    .footer-right { display: flex; gap: 24px; }
    .footer-link {
      color: rgba(248, 248, 247, 0.5);
      text-decoration: none;
      transition: color 0.2s;
    }
    .footer-link:hover { color: var(--bg); }

    /* ─── Live dot ─── */
    .live-dot {
      display: inline-block;
      width: 8px; height: 8px;
      background: var(--primary);
      border-radius: 50%;
      margin-right: 6px;
      animation: pulse-dot 2s infinite;
    }
    @keyframes pulse-dot {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.4; }
    }

    /* ─── Waitlist Modal ─── */
    .modal-overlay {
      position: fixed;
      inset: 0;
      z-index: 9999;
      display: flex;
      align-items: center;
      justify-content: center;
      background: rgba(18, 8, 1, 0.6);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      animation: modal-fade-in 0.25s ease;
    }
    @keyframes modal-fade-in {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    .modal-card {
      width: 100%;
      max-width: 440px;
      margin: 0 24px;
      padding: 48px 40px;
      background: var(--bg);
      border: 1px solid var(--border);
      box-shadow: 0 25px 60px -12px rgba(18, 8, 1, 0.35);
      text-align: center;
      animation: modal-slide-up 0.3s ease;
    }
    @keyframes modal-slide-up {
      from { opacity: 0; transform: translateY(16px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .modal-title {
      font-family: var(--font-display);
      font-size: 32px;
      font-weight: 300;
      line-height: 1.15;
      letter-spacing: -0.04em;
      margin: 0 0 8px;
      color: var(--ink);
    }
    .modal-title em { font-style: italic; color: var(--ink); }
    .modal-subtitle {
      font-size: 15px;
      color: var(--muted);
      margin: 0 0 28px;
      line-height: 1.5;
    }
    .modal-input {
      width: 100%;
      box-sizing: border-box;
      padding: 14px 16px;
      border: 1px solid var(--border);
      background: #F0F0EF;
      color: var(--ink);
      font-family: var(--font-body);
      font-size: 14px;
      outline: none;
      margin-bottom: 12px;
      transition: border-color 0.2s;
    }
    .modal-input:focus {
      border-color: var(--primary);
    }
    .modal-input::placeholder {
      color: var(--muted);
    }
    .modal-submit {
      width: 100%;
      padding: 14px 16px;
      border: none;
      background: var(--ink);
      color: var(--bg);
      font-family: var(--font-body);
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      transition: opacity 0.2s;
    }
    .modal-submit:hover { opacity: 0.85; }
    .modal-submit:disabled {
      opacity: 0.4;
      cursor: not-allowed;
    }
    .modal-error {
      margin-top: 12px;
      font-size: 13px;
      color: #b44a3e;
    }
    .modal-close {
      position: absolute;
      top: 16px;
      right: 16px;
      background: none;
      border: none;
      color: var(--muted);
      cursor: pointer;
      font-size: 20px;
      line-height: 1;
      padding: 4px;

    /* ─────────────────────────────────────────────

    ───────────────────────────────────────────── */
    function BeforeAfter() {
      const [pos, setPos] = useState(50);
      const [containerWidth, setContainerWidth] = useState(0);
      const containerRef = useRef(null);
      const dragging = useRef(false);

      const handleMove = useCallback((clientX) => {
        if (!dragging.current || !containerRef.current) return;
        const rect = containerRef.current.getBoundingClientRect();
        const x = clientX - rect.left;
        const pct = Math.max(0, Math.min(100, (x / rect.width) * 100));
        setPos(pct);
      }, []);

      useEffect(() => {
        const el = containerRef.current;
        if (!el) return;
        const ro = new ResizeObserver(entries => {
          for (const entry of entries) {
            setContainerWidth(entry.contentRect.width);
          }
        });
        ro.observe(el);
        setContainerWidth(el.offsetWidth);
        return () => ro.disconnect();
      }, []);

      useEffect(() => {
        const onMouseMove = (e) => handleMove(e.clientX);
        const onTouchMove = (e) => handleMove(e.touches[0].clientX);
        const onUp = () => { dragging.current = false; };

        document.addEventListener('mousemove', onMouseMove);
        document.addEventListener('touchmove', onTouchMove);
        document.addEventListener('mouseup', onUp);
        document.addEventListener('touchend', onUp);
        return () => {
          document.removeEventListener('mousemove', onMouseMove);
          document.removeEventListener('touchmove', onTouchMove);
          document.removeEventListener('mouseup', onUp);
          document.removeEventListener('touchend', onUp);

                </div>
              </div>

              {/* Before (overlay, clipped) */}

                <div className="slider-before" style={{ width: containerWidth || '100%' }}>
                  <div className="slider-label slider-label--before">Before · Raw GPT</div>
                  <p className="slider-text slider-text--before">
                    Solar energy is an important pathway for homeowners looking to reduce their electricity bills. In an ever-evolving landscape, it is crucial to dive in and understand the nuances of going solar. Many experts agree that harnessing the power of the sun is a game-changer for sustainable living.

              {/* Handle */}

    /* ─────────────────────────────────────────────

    ───────────────────────────────────────────── */
    function WaitlistModal({ open, onClose }) {
      const [email, setEmail] = useState('');
      const [submitting, setSubmitting] = useState(false);
      const [submitted, setSubmitted] = useState(false);
      const [error, setError] = useState(null);

      useEffect(() => {
        if (!open) {
          // Reset state when closed
          setTimeout(() => {
            setEmail('');
            setSubmitted(false);
            setError(null);
          }, 300);
        }
      }, [open]);

      // Close on Escape
      useEffect(() => {
        if (!open) return;
        const onKey = (e) => { if (e.key === 'Escape') onClose(); };
        window.addEventListener('keydown', onKey);
        return () => window.removeEventListener('keydown', onKey);
      }, [open, onClose]);

      async function onSubmit(e) {
        e.preventDefault();
        if (!email.trim() || submitting) return;

        // Secret passphrase: typing "GO" redirects straight to the app
        if (email.trim().toUpperCase() === 'GO') {
          localStorage.setItem('organic_gate_unlocked', 'true');
          const appUrl = window.location.protocol === 'file:' ? 'http://localhost:3001/studio' : '/studio';
          window.location.href = appUrl;
          return;
        }

        // Basic email validation for normal submissions
        if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email.trim())) {
          setError('Please enter a valid email address.');
          return;
        }

        setSubmitting(true);
        setError(null);

        try {
          const r = await fetch('/api/waitlist', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ email: email.trim() }),
          });
          const data = await r.json();
          if (!r.ok) throw new Error(data?.error || 'Submission failed');
          setSubmitted(true);
          // Unlock the app gate and redirect after a brief pause
          localStorage.setItem('organic_gate_unlocked', 'true');
          setTimeout(() => { window.location.href = '/studio'; }, 1500);
        } catch (err) {
          setError(err.message);
        } finally {
          setSubmitting(false);
        }
      }

      if (!open) return null;

      return (
        <div className="modal-overlay" onClick={(e) => { if (e.target === e.currentTarget) onClose(); }}>
          <div className="modal-card" style={{ position: 'relative' }}>
            <button className="modal-close" onClick={onClose} aria-label="Close">×</button>

            {!submitted ? (
              <>
                <div className="modal-eyebrow">Private Beta</div>
                <h2 className="modal-title">
                  Join the <em>waitlist.</em>
                </h2>
                <p className="modal-subtitle">
                  Organic is in private beta. Enter your email to get early access.
                </p>
                <form onSubmit={onSubmit}>
                  <input
                    type="text"
                    className="modal-input"
                    placeholder="you@company.com"
                    value={email}
                    onChange={(e) => setEmail(e.target.value)}
                    autoFocus
                  />
                  <button
                    type="submit"
                    className="modal-submit"
                    disabled={submitting || !email.trim()}
                  >
                    {submitting ? 'Submitting…' : 'Get early access →'}
                  </button>
                </form>
                {error && <p className="modal-error">{error}</p>}
              </>
            ) : (
              <>
                <div className="modal-success-icon">✓</div>
                <h2 className="modal-title">
                  You're <em>in.</em>
                </h2>
                <p className="modal-subtitle" style={{ marginBottom: 0 }}>
                  We'll reach out when it's your turn.
                </p>
              </>
            )}
          </div>
        </div>
      );
    }

    /* ─────────────────────────────────────────────
       App
    ───────────────────────────────────────────── */
    function App() {
      const [waitlistOpen, setWaitlistOpen] = useState(false);
      const openWaitlist = useCallback(() => setWaitlistOpen(true), []);
      const closeWaitlist = useCallback(() => setWaitlistOpen(false), []);

      return (
        <>
          <Nav onOpenWaitlist={openWaitlist} />
          <Hero onOpenWaitlist={openWaitlist} />
          <WhyOrganic />
          <Pipeline />
          <BeforeAfter />
          <Pricing onOpenWaitlist={openWaitlist} />
          <FinalCTA onOpenWaitlist={openWaitlist} />
          <Footer />
          <WaitlistModal open={waitlistOpen} onClose={closeWaitlist} />
        </>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
