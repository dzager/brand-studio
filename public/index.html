<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Organic — Editorial Infrastructure for the AI Search Era</title>
  <meta name="description" content="Organic turns brand voice into scalable editorial infrastructure — articles, imagery, metadata, and AI-search-ready formatting that reads like your internal team wrote it, not a generic AI model." />

  <!-- ABC Arizona super-family (self-hosted): Serif display, Sans body, Mix italic kickers -->
  <style>
    /* Serif — display */
    @font-face { font-family: 'ArizonaSerif'; src: url('fonts/ABCArizonaSerif-Thin-Trial.otf') format('opentype'); font-weight: 100; font-style: normal; font-display: swap; }
    @font-face { font-family: 'ArizonaSerif'; src: url('fonts/ABCArizonaSerif-ThinItalic-Trial.otf') format('opentype'); font-weight: 100; font-style: italic; font-display: swap; }
    @font-face { font-family: 'ArizonaSerif'; src: url('fonts/ABCArizonaSerif-Light-Trial.otf') format('opentype'); font-weight: 300; font-style: normal; font-display: swap; }
    @font-face { font-family: 'ArizonaSerif'; src: url('fonts/ABCArizonaSerif-LightItalic-Trial.otf') format('opentype'); font-weight: 300; font-style: italic; font-display: swap; }
    @font-face { font-family: 'ArizonaSerif'; src: url('fonts/ABCArizonaSerif-Regular-Trial.otf') format('opentype'); font-weight: 400; font-style: normal; font-display: swap; }
    @font-face { font-family: 'ArizonaSerif'; src: url('fonts/ABCArizonaSerif-RegularItalic-Trial.otf') format('opentype'); font-weight: 400; font-style: italic; font-display: swap; }
    @font-face { font-family: 'ArizonaSerif'; src: url('fonts/ABCArizonaSerif-Medium-Trial.otf') format('opentype'); font-weight: 500; font-style: normal; font-display: swap; }
    @font-face { font-family: 'ArizonaSerif'; src: url('fonts/ABCArizonaSerif-MediumItalic-Trial.otf') format('opentype'); font-weight: 500; font-style: italic; font-display: swap; }
    @font-face { font-family: 'ArizonaSerif'; src: url('fonts/ABCArizonaSerif-Bold-Trial.otf') format('opentype'); font-weight: 700; font-style: normal; font-display: swap; }
    @font-face { font-family: 'ArizonaSerif'; src: url('fonts/ABCArizonaSerif-BoldItalic-Trial.otf') format('opentype'); font-weight: 700; font-style: italic; font-display: swap; }

    /* Sans — body */
    @font-face { font-family: 'ArizonaSans'; src: url('fonts/ABCArizonaSans-Light-Trial.otf') format('opentype'); font-weight: 300; font-style: normal; font-display: swap; }
    @font-face { font-family: 'ArizonaSans'; src: url('fonts/ABCArizonaSans-Regular-Trial.otf') format('opentype'); font-weight: 400; font-style: normal; font-display: swap; }
    @font-face { font-family: 'ArizonaSans'; src: url('fonts/ABCArizonaSans-RegularItalic-Trial.otf') format('opentype'); font-weight: 400; font-style: italic; font-display: swap; }
    @font-face { font-family: 'ArizonaSans'; src: url('fonts/ABCArizonaSans-Medium-Trial.otf') format('opentype'); font-weight: 500; font-style: normal; font-display: swap; }
    @font-face { font-family: 'ArizonaSans'; src: url('fonts/ABCArizonaSans-Bold-Trial.otf') format('opentype'); font-weight: 700; font-style: normal; font-display: swap; }

    /* Mix — italic kickers */
    @font-face { font-family: 'ArizonaMix'; src: url('fonts/ABCArizonaMix-RegularItalic-Trial.otf') format('opentype'); font-weight: 400; font-style: italic; font-display: swap; }
    @font-face { font-family: 'ArizonaMix'; src: url('fonts/ABCArizonaMix-Regular-Trial.otf') format('opentype'); font-weight: 400; font-style: normal; font-display: swap; }
  </style>

  <!-- React 18 UMD -->
  <script crossorigin src="https://unpkg.com/react@18.2.0/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18.2.0/umd/react-dom.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/@babel/standalone@7.23.9/babel.min.js"></script>

  <style>
    /* ─── Reset ─── */
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    button { font: inherit; color: inherit; background: none; border: none; }
    a { color: inherit; }

    /* ─── Tokens (muted eco-industrial palette) ─── */
    :root {
      --paper:        #ffffff;
      --paper-deep:   #f7f6f6;

      --ink:          #2c2c2c;
      --ink-soft:     #3D3B32;
      --muted:        #A9A296;

      --moss:         #314235;
      --moss-light:   #3F5645;
      --moss-deep:    #243125;

      --mustard:      #fdfe52;
      --mustard-soft:  #eaeb3c;

      --olive-brown:  #7C7446;
      --sage:         #8F9878;
      --wood:         #8B684B;

      --earth:        #2c2c2c;

      --accent:         var(--moss);
      --accent-light:   var(--moss-light);
      --accent-deep:    var(--moss-deep);
      --accent-on-ink:  var(--mustard);

      --border:       #2c2c2c1A;
      --border-strong: #2c2c2c38;

      --font-display: 'ArizonaSerif', Georgia, serif;
      --font-body:    'ArizonaSans', system-ui, -apple-system, sans-serif;
      --font-mix:     'ArizonaMix', Georgia, serif;
      --font-mono:    ui-monospace, 'SF Mono', Menlo, monospace;

      --text-xs:   11px;
      --text-sm:   13px;
      --text-base: 15px;
      --text-md:   16px;
      --text-lg:   18px;
      --text-xl:   20px;
      --text-2xl:  24px;
      --text-3xl:  32px;
      --text-4xl:  48px;
      --text-5xl:  56px;
      --text-6xl:  60px;

      --space-1:   4px;
      --space-2:   8px;
      --space-3:   12px;
      --space-4:   16px;
      --space-5:   24px;
      --space-6:   32px;
      --space-7:   48px;
      --space-8:   64px;
      --space-9:   96px;
      --space-10: 128px;

      --max-w: 1440px;
      --px: 64px;
    }

    html { scroll-behavior: smooth; }

    body {
      background-color: var(--paper);
      background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='220' height='220'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='0.75' numOctaves='3' stitchTiles='stitch'/><feColorMatrix values='0 0 0 0 0.06  0 0 0 0 0.05  0 0 0 0 0.04  0 0 0 0.04 0'/></filter><rect width='100%25' height='100%25' filter='url(%23n)'/></svg>");
      color: var(--ink);
      font-family: var(--font-body);
      font-size: var(--text-md);
      line-height: 1.55;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    /* ─── Layout primitives ─── */
    .container { max-width: var(--max-w); margin: 0 auto; padding: 0 var(--px); }

    /* ─── Buttons ─── */
    .btn {
      display: inline-flex; align-items: baseline; gap: var(--space-2);
      padding: var(--space-3) 22px;
      font-family: var(--font-body);
      font-size: var(--text-base); font-weight: 500;
      text-decoration: none; cursor: pointer;
      transition: transform 0.18s cubic-bezier(0.22, 1, 0.36, 1), opacity 0.18s, background 0.18s, color 0.18s, border-color 0.18s;
      letter-spacing: 0.005em;
    }
    .btn:active { transform: translateY(1px); }
    .btn--ink     { background: var(--mustard);  color: var(--ink); }
    .btn--ink:hover     { background: var(--mustard-soft); opacity: 1; }
    .btn--paper   { background: var(--paper); color: var(--ink); }
    .btn--paper:hover   { opacity: 0.9; }
    .btn--ghost   { background: transparent; color: var(--ink); border: 1px solid var(--border-strong); }
    .btn--ghost:hover { border-color: var(--ink); background: #2c2c2c0D; }
    .btn--moss    { background: var(--moss); color: var(--paper); }
    .btn--moss:hover { background: var(--moss-light); }
    .btn-arrow {
      display: inline-block;
      font-family: var(--font-display);
      font-style: italic;
      font-weight: 300;
      font-size: 1.1em;
      transition: transform 0.18s cubic-bezier(0.22, 1, 0.36, 1);
    }
    .btn:hover .btn-arrow { transform: translateX(3px); }

    /* ─── Italic kicker ─── */
    .kicker {
      font-family: var(--font-mix);
      font-style: italic;
      font-weight: 400;
      font-size: var(--text-md);
      color: var(--olive-brown);
      letter-spacing: 0;
    }

    /* ─── Nav ─── */
    .nav { padding: 22px 0; }
    .nav-inner { display: flex; align-items: center; justify-content: space-between; gap: 24px; }
    .nav-logo { display: flex; align-items: center; }
    .nav-links { display: flex; align-items: center; gap: 28px; }
    .nav-link {
      font-size: var(--text-base); text-decoration: none; color: var(--ink); opacity: 0.72;
      transition: opacity 0.18s;
    }
    .nav-link:hover { opacity: 1; }
    .nav-actions { display: flex; align-items: center; gap: 14px; }
    .nav-signin { font-size: var(--text-base); color: var(--ink-soft); text-decoration: none; transition: color 0.18s; }
    .nav-signin:hover { color: var(--ink); }

    /* ─── Hero ─── */
    .hero { padding: 80px 0 100px; }
    .hero-inner { max-width: 900px; }
    .hero-eyebrow {
      font-family: var(--font-mono);
      font-size: var(--text-xs);
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--moss);
      margin-bottom: var(--space-5);
      display: flex; align-items: center; gap: 10px;
    }
    .hero-eyebrow-dot {
      width: 8px; height: 8px; border-radius: 50%; background: var(--moss);
      animation: pulse-dot 2.2s infinite;
    }
    .hero-headline {
      font-family: var(--font-display);
      font-weight: 100;
      font-size: clamp(48px, 5.5vw, 80px);
      line-height: 0.96;
      letter-spacing: -0.05em;
      font-kerning: normal;
      font-feature-settings: "kern" 1;
      margin: 0 0 var(--space-6);
      max-width: 14ch;
    }
    .hero-headline em { font-style: italic; font-weight: 400; color: var(--moss); letter-spacing: -0.055em; }
    .hero-tagline {
      font-family: var(--font-mix);
      font-style: italic;
      font-size: clamp(var(--text-xl), 2vw, var(--text-2xl));
      color: var(--ink);
      margin-bottom: var(--space-5);
      letter-spacing: -0.01em;
    }
    .hero-lede {
      font-size: clamp(var(--text-md), 1.3vw, var(--text-lg));
      line-height: 1.55;
      color: var(--ink-soft);
      max-width: 600px;
      margin-bottom: var(--space-7);
    }
    .hero-ctas { display: flex; flex-wrap: wrap; gap: var(--space-3); margin-bottom: var(--space-7); }
    .hero-signals {
      display: flex; flex-wrap: wrap; gap: var(--space-3) var(--space-5);
      font-family: var(--font-mix);
      font-style: italic;
      font-size: var(--text-sm);
      color: var(--ink-soft);
    }
    .hero-signal { display: inline-flex; align-items: center; gap: 8px; }
    .hero-signal::before { content: "·"; color: var(--moss); font-weight: 600; font-size: 1.2em; }
    .hero-signal:first-child::before { content: ""; margin: 0; }

    /* ─── Section frame ─── */
    .section { padding: clamp(72px, 11vw, 132px) 0; }
    .section--stone { background: var(--paper-deep); }
    .section--ink { background: var(--earth); color: var(--paper); }
    .section-head {
      display: grid;
      grid-template-columns: minmax(0, 1fr);
      gap: 14px;
      margin-bottom: clamp(40px, 6vw, 68px);
      max-width: 880px;
    }
    .section-head__kicker {
      font-family: var(--font-mix);
      font-style: italic;
      font-size: var(--text-md);
      color: var(--olive-brown);
    }
    .section--ink .section-head__kicker { color: var(--mustard); }
    .section-head__title {
      font-family: var(--font-display);
      font-weight: 300;
      font-size: clamp(var(--text-3xl), 3.8vw, var(--text-5xl));
      line-height: 1.04;
      letter-spacing: -0.035em;
      color: var(--ink);
    }
    .section--ink .section-head__title { color: var(--paper); }
    .section-head__title em { font-style: italic; font-weight: 400; color: var(--moss); }
    .section--ink .section-head__title em { color: var(--mustard); }
    .section-head__sub {
      font-size: clamp(16px, 1.2vw, 18px);
      line-height: 1.55;
      color: var(--ink-soft);
      max-width: 60ch;
    }
    .section--ink .section-head__sub { color: #E9E4DAB3; }

    /* ─── Scroll reveal ─── */
    .reveal {
      opacity: 0;
      transform: translateY(28px);
      transition: opacity 0.7s cubic-bezier(0.22, 1, 0.36, 1), transform 0.7s cubic-bezier(0.22, 1, 0.36, 1);
    }
    .reveal.revealed {
      opacity: 1;
      transform: translateY(0);
    }

    /* ─── Market Shift ─── */
    .shift-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 0;
      border: 1px solid var(--border);
    }
    .shift-card {
      padding: 36px 30px;
      border-right: 1px solid var(--border);
      display: flex; flex-direction: column; gap: 14px;
    }
    .shift-card:last-child { border-right: none; }
    .shift-card__num {
      font-family: var(--font-mix);
      font-style: italic;
      font-size: var(--text-sm);
      color: var(--olive-brown);
    }
    .shift-card__title {
      font-family: var(--font-display);
      font-weight: 300;
      font-size: clamp(var(--text-xl), 1.8vw, var(--text-2xl));
      line-height: 1.12;
      letter-spacing: -0.022em;
      color: var(--ink);
    }
    .shift-card__title em { font-style: italic; font-weight: 500; color: var(--moss); }
    .shift-card__body {
      font-size: var(--text-base);
      line-height: 1.55;
      color: var(--ink-soft);
    }

    /* ─── Problem ─── */
    .problem-layout {
      display: grid;
      grid-template-columns: minmax(0, 1.1fr) minmax(0, 0.9fr);
      gap: 72px;
      align-items: start;
    }
    .problem-tells { list-style: none; display: flex; flex-direction: column; gap: 0; }
    .problem-tell {
      display: flex; align-items: baseline; gap: 16px;
      padding: 20px 0;
      border-bottom: 1px solid var(--border);
      font-family: var(--font-display);
      font-weight: 300;
      font-size: clamp(var(--text-lg), 1.6vw, var(--text-2xl));
      line-height: 1.2;
      letter-spacing: -0.015em;
      color: var(--ink);
    }
    .problem-tell:first-child { border-top: 1px solid var(--border); }
    .problem-tell__icon {
      font-family: var(--font-mix);
      font-style: italic;
      font-size: var(--text-sm);
      color: var(--muted);
      flex-shrink: 0;
      width: 20px;
      text-align: center;
    }
    .problem-consequence {
      margin-top: var(--space-7);
    }
    .problem-consequence__text {
      font-family: var(--font-display);
      font-weight: 300;
      font-size: clamp(var(--text-xl), 2vw, var(--text-3xl));
      line-height: 1.2;
      letter-spacing: -0.025em;
      color: var(--ink);
      max-width: 48ch;
    }
    .problem-consequence__text em { font-style: italic; font-weight: 400; color: var(--moss); }
    .problem-cost {
      margin-top: var(--space-5);
      font-size: var(--text-md);
      line-height: 1.55;
      color: var(--ink-soft);
      max-width: 52ch;
    }

    /* ─── Insight ─── */
    .insight-quote {
      font-family: var(--font-display);
      font-weight: 100;
      font-size: clamp(36px, 4.5vw, 64px);
      line-height: 1.06;
      letter-spacing: -0.04em;
      color: var(--ink);
      max-width: 16ch;
      margin-bottom: var(--space-6);
    }
    .insight-quote em { font-style: italic; font-weight: 400; color: var(--moss); }
    .insight-traits {
      font-family: var(--font-mix);
      font-style: italic;
      font-size: clamp(var(--text-md), 1.3vw, var(--text-lg));
      color: var(--ink-soft);
      margin-bottom: var(--space-6);
      max-width: 50ch;
      line-height: 1.6;
    }
    .insight-body {
      font-size: var(--text-md);
      line-height: 1.55;
      color: var(--ink-soft);
      max-width: 52ch;
      margin-bottom: var(--space-8);
    }
    .insight-body strong {
      color: var(--ink);
      font-weight: 500;
    }

    /* ─── Before / After ─── */
    .ba { position: relative; overflow: hidden; border: 1px solid var(--border); background: var(--paper); }
    .ba-side { padding: clamp(36px, 5vw, 60px); min-height: 320px; }
    .ba-after { background: var(--paper); }
    .ba-before-wrap {
      position: absolute; top: 0; left: 0; height: 100%;
      overflow: hidden;
      border-right: 1.5px solid var(--ink);
      z-index: 2;
    }
    .ba-before { background: var(--paper-deep); padding: clamp(36px, 5vw, 60px); min-height: 320px; width: 100%; }
    .ba-label {
      font-family: var(--font-mix); font-style: italic; font-size: var(--text-base);
      margin-bottom: 18px;
      display: inline-flex; align-items: center; gap: 8px;
      color: var(--ink-soft);
    }
    .ba-label--after  { color: var(--moss); }
    .ba-text {
      font-family: var(--font-body);
      font-weight: 400;
      font-size: clamp(var(--text-base), 1.05vw, var(--text-md));
      line-height: 1.55;
      max-width: 56ch;
      letter-spacing: 0;
    }
    .ba-text--before { font-style: italic; color: var(--muted); }
    .ba-text--after  {
      color: var(--ink);
      font-family: var(--font-display);
      font-weight: 400;
      font-style: normal;
      font-size: clamp(16px, 1.2vw, 18px);
      line-height: 1.5;
      letter-spacing: -0.01em;
    }
    .ba-tags { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 18px; }
    .ba-tag {
      font-family: var(--font-mono); font-size: var(--text-xs);
      padding: 4px 10px; letter-spacing: 0;
    }
    .ba-tag--muted    { border: 1px solid var(--muted); color: var(--muted); }
    .ba-tag--verified { background: var(--moss); color: var(--paper); border: 1px solid var(--moss); }
    .ba-handle { position: absolute; top: 0; width: 1.5px; height: 100%; z-index: 3; pointer-events: none; background: var(--ink); }
    .ba-knob {
      position: absolute; top: 50%; transform: translate(-50%, -50%);
      width: 44px; height: 44px;
      background: var(--ink); color: var(--paper);
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      pointer-events: none;
    }
    .ba-knob-area {
      position: absolute; top: 0; height: 100%; width: 80px;
      z-index: 4; cursor: col-resize;
    }
    .live-dot {
      display: inline-block; width: 8px; height: 8px;
      background: currentColor; border-radius: 50%;
      animation: pulse-dot 2.2s infinite;
    }
    @keyframes pulse-dot { 0%, 100% { opacity: 1; } 50% { opacity: 0.35; } }

    /* ─── Product — Pipeline ─── */
    .pipeline-flow {
      position: relative;
      display: grid;
      grid-template-columns: repeat(7, minmax(0, 1fr));
      gap: 0;
      margin-top: 24px;
      margin-bottom: var(--space-9);
    }
    .pipeline-flow::before {
      content: "";
      position: absolute;
      top: 22px;
      left: calc(100% / 14);
      right: calc(100% / 14);
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--moss) 8%, var(--moss) 92%, transparent);
    }
    .pipeline-node { display: flex; flex-direction: column; align-items: center; text-align: center; padding: 0 12px; gap: 14px; }
    .pipeline-node__dot {
      width: 44px; height: 44px;
      display: flex; align-items: center; justify-content: center;
      background: var(--paper);
      border: 1px solid var(--ink);
      color: var(--ink);
      font-family: var(--font-mix);
      font-style: italic;
      font-size: var(--text-md);
      border-radius: 50%;
      position: relative;
      z-index: 1;
    }
    .pipeline-node:first-child .pipeline-node__dot { background: var(--mustard); color: var(--ink); border-color: var(--mustard); }
    .pipeline-node:last-child .pipeline-node__dot  { background: var(--mustard); color: var(--ink); border-color: var(--mustard); }
    .pipeline-node__name {
      font-family: var(--font-display);
      font-weight: 400;
      font-size: var(--text-lg);
      letter-spacing: -0.015em;
      color: var(--ink);
    }
    .pipeline-node__chip {
      font-family: var(--font-mono);
      font-size: var(--text-xs);
      color: var(--ink-soft);
      letter-spacing: 0;
    }

    /* ─── Product — Article Preview ─── */
    .preview { position: relative; }
    .preview::before,
    .preview::after {
      content: '';
      position: absolute;
      left: 4px; right: 4px; bottom: 0; height: 100%;
      background: var(--paper);
      border-radius: 2px;
      box-shadow: 0 2px 8px -4px rgba(30,29,24,0.10);
      z-index: -1;
    }
    .preview::before {
      transform: translateY(6px) scale(0.98);
      opacity: 0.7;
      border: 1px solid var(--border);
    }
    .preview::after {
      transform: translateY(12px) scale(0.96);
      opacity: 0.4;
      border: 1px solid var(--border);
    }
    .preview-card {
      background: var(--paper);
      box-shadow: 0 22px 60px -32px rgba(30,29,24,0.30), 0 2px 8px -4px rgba(30,29,24,0.12);
      overflow: hidden;
      transition: transform 0.4s cubic-bezier(0.22, 1, 0.36, 1),
                  opacity 0.5s ease;
      opacity: 1;
    }
    .preview-card.fade-out {
      opacity: 0;
      transform: translateY(24px) scale(0.97);
      transition: opacity 0.35s ease, transform 0.35s ease;
    }

<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, useRef, useCallback } = React;

    /* ─── Scroll Reveal Hook ─── */
    function useReveal(threshold = 0.15) {
      const ref = useRef(null);
      useEffect(() => {
        const el = ref.current;
        if (!el) return;
        const observer = new IntersectionObserver(
          ([entry]) => { if (entry.isIntersecting) { el.classList.add('revealed'); observer.unobserve(el); } },
          { threshold }
        );
        observer.observe(el);
        return () => observer.disconnect();
      }, [threshold]);
      return ref;
    }

    function Reveal({ children, className = '', delay = 0 }) {
      const ref = useReveal();
      return (
        <div ref={ref} className={`reveal ${className}`} style={delay ? { transitionDelay: `${delay}ms` } : undefined}>
          {children}
        </div>
      );
    }

      const [pos, setPos] = useState(50);

      const dragging = useRef(false);

      const handleMove = useCallback((clientX) => {
        if (!dragging.current || !containerRef.current) return;
        const rect = containerRef.current.getBoundingClientRect();
        const x = clientX - rect.left;
        const pct = Math.max(0, Math.min(100, (x / rect.width) * 100));
        setPos(pct);
      }, []);

      useEffect(() => {
        const el = containerRef.current;
        if (!el) return;
        const ro = new ResizeObserver(entries => {
          for (const entry of entries) setW(entry.contentRect.width);
        });
        ro.observe(el);
        setW(el.offsetWidth);
        return () => ro.disconnect();
      }, []);

      useEffect(() => {
        const onMouseMove = (e) => handleMove(e.clientX);
        const onTouchMove = (e) => handleMove(e.touches[0].clientX);
        const onUp = () => { dragging.current = false; };
        document.addEventListener('mousemove', onMouseMove);
        document.addEventListener('touchmove', onTouchMove);
        document.addEventListener('mouseup', onUp);
        document.addEventListener('touchend', onUp);
        return () => {
          document.removeEventListener('mousemove', onMouseMove);
          document.removeEventListener('touchmove', onTouchMove);
          document.removeEventListener('mouseup', onUp);
          document.removeEventListener('touchend', onUp);
        };
      }, [handleMove]);

            </div>
            <div

    function StartModal({ open, onClose }) {
      const [email, setEmail] = useState('');
      const [submitting, setSubmitting] = useState(false);
      const [submitted, setSubmitted] = useState(false);
      const [error, setError] = useState(null);

      useEffect(() => {
        if (!open) {
          const t = setTimeout(() => {
            setEmail(''); setSubmitted(false); setError(null);
          }, 300);
          return () => clearTimeout(t);
        }
      }, [open]);

      useEffect(() => {
        if (!open) return;
        const onKey = (e) => { if (e.key === 'Escape') onClose(); };
        window.addEventListener('keydown', onKey);
        return () => window.removeEventListener('keydown', onKey);
      }, [open, onClose]);

      async function onSubmit(e) {
        e.preventDefault();
        if (!email.trim() || submitting) return;

        if (email.trim().toUpperCase() === 'GO') {
          localStorage.setItem('organic_gate_unlocked', 'true');
          const appUrl = window.location.protocol === 'file:' ? 'http://localhost:3001/studio' : '/studio';
          window.location.href = appUrl;
          return;
        }

        if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email.trim())) {
          setError('That email does not look right. Try a different one.');
          return;
        }

        setSubmitting(true);
        setError(null);
        try {
          const r = await fetch('/api/waitlist', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ email: email.trim() }),
          });
          const data = await r.json();
          if (!r.ok) throw new Error(data?.error || 'Something went wrong. Try again in a moment.');
          setSubmitted(true);
          localStorage.setItem('organic_gate_unlocked', 'true');
          setTimeout(() => { window.location.href = '/studio'; }, 1500);
        } catch (err) {
          setError(err.message);
        } finally {
          setSubmitting(false);
        }
      }

      if (!open) return null;

      return (
        <div className="modal-overlay" onClick={(e) => { if (e.target === e.currentTarget) onClose(); }}>
          <div className="modal-card">
            <button className="modal-close" onClick={onClose} aria-label="Close">×</button>

            {!submitted ? (
              <>
                <div className="modal-kicker">Start free</div>
                <h2 className="modal-title">
                  Spin up <em>your studio.</em>
                </h2>
                <p className="modal-subtitle">
                  Enter your email. We will set up your studio and open it in a moment. Cancel anytime in the first 7 days.
                </p>
                <form onSubmit={onSubmit}>
                  <input
                    type="email"
                    inputMode="email"
                    autoComplete="email"
                    spellCheck={false}
                    required
                    className="modal-input"
                    placeholder="you@company.com"
                    value={email}
                    onChange={(e) => setEmail(e.target.value)}
                    autoFocus
                  />
                  <button type="submit" className="modal-submit" disabled={submitting || !email.trim()}>
                    {submitting ? 'Setting up…' : <>Open my studio <span className="btn-arrow">↗</span></>}
                  </button>
                </form>
                {error && <p className="modal-error">{error}</p>}
              </>
            ) : (
              <>
                <div className="modal-success-mark">✓</div>
                <h2 className="modal-title">
                  Your studio is <em>opening.</em>
                </h2>
                <p className="modal-subtitle" style={{ marginBottom: 0 }}>
                  Sit tight for a second. We're routing you in.
                </p>
              </>
            )}
          </div>
        </div>
      );
    }

          <Audience />
          <Pricing onStart={open} />
          <FinalCTA onStart={open} />
          <Footer />
          <StartModal open={modalOpen} onClose={close} />
        </>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
