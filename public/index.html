<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Organic — AI Content Platform</title>
  <meta name="description" content="The AI content platform that sounds like your brand, not like AI. Multi-brand content operations with humanization, three-model fact-checking, and visual style matching." />

  <!-- ABC Arizona super-family (self-hosted): Serif display, Sans body, Mix italic kickers -->
  <style>
    /* Serif — display */
    @font-face { font-family: 'ArizonaSerif'; src: url('fonts/ABCArizonaSerif-Thin-Trial.otf') format('opentype'); font-weight: 100; font-style: normal; font-display: swap; }
    @font-face { font-family: 'ArizonaSerif'; src: url('fonts/ABCArizonaSerif-ThinItalic-Trial.otf') format('opentype'); font-weight: 100; font-style: italic; font-display: swap; }
    @font-face { font-family: 'ArizonaSerif'; src: url('fonts/ABCArizonaSerif-Light-Trial.otf') format('opentype'); font-weight: 300; font-style: normal; font-display: swap; }
    @font-face { font-family: 'ArizonaSerif'; src: url('fonts/ABCArizonaSerif-LightItalic-Trial.otf') format('opentype'); font-weight: 300; font-style: italic; font-display: swap; }
    @font-face { font-family: 'ArizonaSerif'; src: url('fonts/ABCArizonaSerif-Regular-Trial.otf') format('opentype'); font-weight: 400; font-style: normal; font-display: swap; }
    @font-face { font-family: 'ArizonaSerif'; src: url('fonts/ABCArizonaSerif-RegularItalic-Trial.otf') format('opentype'); font-weight: 400; font-style: italic; font-display: swap; }
    @font-face { font-family: 'ArizonaSerif'; src: url('fonts/ABCArizonaSerif-Medium-Trial.otf') format('opentype'); font-weight: 500; font-style: normal; font-display: swap; }
    @font-face { font-family: 'ArizonaSerif'; src: url('fonts/ABCArizonaSerif-MediumItalic-Trial.otf') format('opentype'); font-weight: 500; font-style: italic; font-display: swap; }
    @font-face { font-family: 'ArizonaSerif'; src: url('fonts/ABCArizonaSerif-Bold-Trial.otf') format('opentype'); font-weight: 700; font-style: normal; font-display: swap; }
    @font-face { font-family: 'ArizonaSerif'; src: url('fonts/ABCArizonaSerif-BoldItalic-Trial.otf') format('opentype'); font-weight: 700; font-style: italic; font-display: swap; }

    /* Sans — body */
    @font-face { font-family: 'ArizonaSans'; src: url('fonts/ABCArizonaSans-Light-Trial.otf') format('opentype'); font-weight: 300; font-style: normal; font-display: swap; }
    @font-face { font-family: 'ArizonaSans'; src: url('fonts/ABCArizonaSans-Regular-Trial.otf') format('opentype'); font-weight: 400; font-style: normal; font-display: swap; }
    @font-face { font-family: 'ArizonaSans'; src: url('fonts/ABCArizonaSans-RegularItalic-Trial.otf') format('opentype'); font-weight: 400; font-style: italic; font-display: swap; }
    @font-face { font-family: 'ArizonaSans'; src: url('fonts/ABCArizonaSans-Medium-Trial.otf') format('opentype'); font-weight: 500; font-style: normal; font-display: swap; }
    @font-face { font-family: 'ArizonaSans'; src: url('fonts/ABCArizonaSans-Bold-Trial.otf') format('opentype'); font-weight: 700; font-style: normal; font-display: swap; }

    /* Mix — italic kickers */
    @font-face { font-family: 'ArizonaMix'; src: url('fonts/ABCArizonaMix-RegularItalic-Trial.otf') format('opentype'); font-weight: 400; font-style: italic; font-display: swap; }
    @font-face { font-family: 'ArizonaMix'; src: url('fonts/ABCArizonaMix-Regular-Trial.otf') format('opentype'); font-weight: 400; font-style: normal; font-display: swap; }
  </style>



  <!-- React 18 UMD -->
  <script crossorigin src="https://unpkg.com/react@18.2.0/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18.2.0/umd/react-dom.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/@babel/standalone@7.23.9/babel.min.js"></script>

  <style>
    /* ─── Reset ─── */
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    button { font: inherit; color: inherit; background: none; border: none; }
    a { color: inherit; }

    /* ─── Tokens (muted eco-industrial palette) ─── */
    :root {
      /* Two surfaces, alternating — bone and taupe */
      --paper:        #ffffff;                /* pure white */
      --paper-deep:   #f7f6f6;                /* light warm gray — section bands */

      /* Near-black charcoal, never pure #000 */
      --ink:          #2c2c2c;                /* deep charcoal */
      --ink-soft:     #3D3B32;                /* softened charcoal */
      --muted:        #A9A296;                /* warm gray — structural neutral */

      /* Brand accent — dark moss green */
      --moss:         #314235;
      --moss-light:   #3F5645;
      --moss-deep:    #243125;

      /* Lime highlight — bright chartreuse green */
      --mustard:      #fdfe52;
      --mustard-soft:  #eaeb3c;

      /* Supporting organic tones */
      --olive-brown:  #7C7446;                /* organic accent */
      --sage:         #8F9878;                /* desaturated green */
      --wood:         #8B684B;                /* natural material accent */

      /* Charcoal for dark sections */
      --earth:        #2c2c2c;

      /* Accent aliases — moss green as primary accent */
      --accent:         var(--moss);
      --accent-light:   var(--moss-light);
      --accent-deep:    var(--moss-deep);
      --accent-on-ink:  var(--mustard);        /* lime pops on charcoal */

      --border:       #2c2c2c1A;               /* charcoal 10% */
      --border-strong: #2c2c2c38;              /* charcoal 22% */

      --font-display: 'ArizonaSerif', Georgia, serif;
      --font-body:    'ArizonaSans', system-ui, -apple-system, sans-serif;
      --font-mix:     'ArizonaMix', Georgia, serif;
      --font-mono:    ui-monospace, 'SF Mono', Menlo, monospace;

      /* ─── Type scale (major-second 1.125, base 16) ─── */
      --text-xs:   11px;            /* mono labels, chips */
      --text-sm:   13px;            /* captions, small body */
      --text-base: 15px;            /* body copy, nav, UI */
      --text-md:   16px;            /* lede, body emphasis */
      --text-lg:   18px;            /* pipeline names, subheads */
      --text-xl:   20px;            /* hero lede, kicker lg */
      --text-2xl:  24px;            /* support-card titles */
      --text-3xl:  32px;            /* section heads min */
      --text-4xl:  48px;            /* feature titles */
      --text-5xl:  56px;            /* section heads max */
      --text-6xl:  60px;            /* pricing big number */

      /* ─── 8px baseline grid ─── */
      --space-1:   4px;
      --space-2:   8px;
      --space-3:   12px;
      --space-4:   16px;
      --space-5:   24px;
      --space-6:   32px;
      --space-7:   48px;
      --space-8:   64px;
      --space-9:   96px;
      --space-10: 128px;

      --max-w: 1440px;
      --px: 64px;
    }

    html { scroll-behavior: smooth; }

    body {
      background-color: var(--paper);
      background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='220' height='220'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='0.75' numOctaves='3' stitchTiles='stitch'/><feColorMatrix values='0 0 0 0 0.06  0 0 0 0 0.05  0 0 0 0 0.04  0 0 0 0.04 0'/></filter><rect width='100%25' height='100%25' filter='url(%23n)'/></svg>");
      color: var(--ink);
      font-family: var(--font-body);
      font-size: var(--text-md);
      line-height: 1.55;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    /* ─── Layout primitives ─── */
    .container { max-width: var(--max-w); margin: 0 auto; padding: 0 var(--px); }

    /* ─── Buttons ─── */
    .btn {
      display: inline-flex; align-items: baseline; gap: var(--space-2);
      padding: var(--space-3) 22px;
      font-family: var(--font-body);
      font-size: var(--text-base); font-weight: 500;
      text-decoration: none; cursor: pointer;
      transition: transform 0.18s cubic-bezier(0.22, 1, 0.36, 1), opacity 0.18s, background 0.18s, color 0.18s, border-color 0.18s;
      letter-spacing: 0.005em;
    }
    .btn:active { transform: translateY(1px); }
    .btn--ink     { background: var(--mustard);  color: var(--ink); }
    .btn--ink:hover     { background: var(--mustard-soft); opacity: 1; }
    .btn--paper   { background: var(--paper); color: var(--ink); }
    .btn--paper:hover   { opacity: 0.9; }
    .btn--ghost   { background: transparent; color: var(--ink); border: 1px solid var(--border-strong); }
    .btn--ghost:hover { border-color: var(--ink); background: #2c2c2c0D; }
    .btn-arrow {
      display: inline-block;
      font-family: var(--font-display);
      font-style: italic;
      font-weight: 300;
      font-size: 1.1em;
      transition: transform 0.18s cubic-bezier(0.22, 1, 0.36, 1);
    }
    .btn:hover .btn-arrow { transform: translateX(3px); }

    /* ─── Italic kicker ─── */
    .kicker {
      font-family: var(--font-mix);
      font-style: italic;
      font-weight: 400;
      font-size: var(--text-md);
      color: var(--olive-brown);
      letter-spacing: 0;
    }

    /* ─── Display em (no color — italic + weight bump carries the emphasis) ─── */
    .em-display {
      font-style: italic;
      font-weight: 500;
      color: var(--ink);
    }

    /* ─── Nav ─── */
    .nav { padding: 22px 0; }
    .nav-inner { display: flex; align-items: center; justify-content: space-between; gap: 24px; }
    .nav-logo { display: flex; align-items: center; }
    .nav-links { display: flex; align-items: center; gap: 28px; }
    .nav-link {
      font-size: var(--text-base); text-decoration: none; color: var(--ink); opacity: 0.72;
      transition: opacity 0.18s;
    }
    .nav-link:hover { opacity: 1; }
    .nav-actions { display: flex; align-items: center; gap: 14px; }
    .nav-signin { font-size: var(--text-base); color: var(--ink-soft); text-decoration: none; transition: color 0.18s; }
    .nav-signin:hover { color: var(--ink); }

    /* ─── Hero ─── */
    .hero { padding: 64px 0 88px; }
    .hero-grid { display: grid; grid-template-columns: minmax(0, 1.25fr) minmax(0, 0.75fr); gap: 72px; align-items: center; }
    .hero-headline {
      font-family: var(--font-display);
      font-weight: 100;
      font-size: 5vw;
      line-height: 0.94;
      letter-spacing: -0.055em;
      font-kerning: normal;
      font-feature-settings: "kern" 1;
      margin: var(--space-5) 0 var(--space-5);
    }
    .hero-headline em { font-style: italic; font-weight: 400; color: var(--moss); letter-spacing: -0.055em; }
    .hero-lede {
      font-size: clamp(var(--text-lg), 1.5vw, var(--text-2xl));
      line-height: 1.5;
      color: var(--ink-soft);
      max-width: 520px;
      margin-bottom: var(--space-6);
    }
    .hero-ctas { display: flex; flex-wrap: wrap; gap: var(--space-3); margin-bottom: var(--space-7); }
    .hero-tags {
      display: flex; flex-wrap: wrap; gap: var(--space-4) var(--space-5);
      font-family: var(--font-mix);
      font-style: italic;
      font-size: var(--text-sm);
      color: var(--ink-soft);
    }
    .hero-tag::before { content: "·"; margin-right: 10px; color: var(--mustard); }
    .hero-tag:first-child::before { content: ""; margin-right: 0; }

    /* ─── Article preview (card deck) ─── */
    .preview { position: relative; }
    .preview::before,
    .preview::after {
      content: '';
      position: absolute;
      left: 4px; right: 4px; bottom: 0; height: 100%;
      background: var(--paper);
      border-radius: 2px;
      box-shadow: 0 2px 8px -4px rgba(30,29,24,0.10);
      z-index: -1;
    }
    .preview::before {
      transform: translateY(6px) scale(0.98);
      opacity: 0.7;
      border: 1px solid var(--border);
    }
    .preview::after {
      transform: translateY(12px) scale(0.96);
      opacity: 0.4;
      border: 1px solid var(--border);
    }
    .preview-card {
      background: var(--paper);
      box-shadow: 0 22px 60px -32px rgba(30,29,24,0.30), 0 2px 8px -4px rgba(30,29,24,0.12);
      overflow: hidden;
      transition: transform 0.4s cubic-bezier(0.22, 1, 0.36, 1),
                  opacity 0.5s ease;
      opacity: 1;
    }
    .preview-card.fade-out {
      opacity: 0;
      transform: translateY(24px) scale(0.97);
      transition: opacity 0.35s ease, transform 0.35s ease;
    }
    .preview-card.fade-in {
      animation: cardDeckIn 0.5s cubic-bezier(0.22, 1, 0.36, 1) forwards;
    }
    @keyframes cardDeckIn {
      from { opacity: 0; transform: translateY(-8px) scale(1.01); }
      to   { opacity: 1; transform: translateY(0) scale(1); }
    }
    .preview:hover .preview-card { transform: translateY(-4px); }
    .preview-image-wrap {
      position: relative;
      aspect-ratio: 4 / 3;
      background: linear-gradient(135deg, var(--ink), #3D3B32);
      overflow: hidden;
      border-radius: 8px;
    }
    .preview-image {
      position: absolute; inset: 0;
      width: 100%; height: 100%;
      object-fit: cover;
      filter: contrast(1.08) brightness(0.95);
      opacity: 0.95;
    }
    .preview-image-tint {
      position: absolute; inset: 0;
      background: #31423520;
      mix-blend-mode: color;
      pointer-events: none;
    }
    .preview-image-overlay {
      position: absolute; inset: 0;
      background: linear-gradient(180deg, transparent 55%, #2c2c2c8C 100%);
      pointer-events: none;
    }
    .preview-image-tag {
      position: absolute;
      left: 20px; bottom: 16px;
      font-family: var(--font-mix); font-style: italic; font-size: var(--text-sm);
      color: var(--paper);
      letter-spacing: 0;
    }
    .preview-body { padding: var(--space-4) var(--space-5) var(--space-5); }
    .preview-meta {
      display: flex; align-items: baseline; gap: var(--space-3);
      font-family: var(--font-mix); font-style: italic; font-size: var(--text-sm);
      color: var(--ink-soft);
      margin-bottom: var(--space-3);
    }
    .preview-meta-dot { width: var(--space-1); height: var(--space-1); border-radius: 50%; background: var(--mustard); display: inline-block; }
    .preview-title {
      font-family: var(--font-display);
      font-weight: 300;
      font-size: clamp(var(--text-md), 1.4vw, var(--text-xl));
      line-height: 1.14;
      letter-spacing: -0.022em;
      color: var(--ink);
      margin-bottom: var(--space-2);
    }
    .preview-title em { font-style: italic; font-weight: 500; color: var(--moss); }
    .preview-excerpt {
      font-size: var(--text-sm);
      line-height: 1.5;
      color: var(--ink-soft);
      max-width: 44ch;
      margin-bottom: var(--space-3);
    }
    .preview-chips { display: flex; flex-wrap: wrap; gap: var(--space-2); }
    .chip {
      display: inline-flex; align-items: center; gap: var(--space-2);
      font-family: var(--font-mono);
      font-size: var(--text-xs);
      padding: 4px 9px;
      border: 1px solid var(--border);
      color: var(--ink-soft);
      background: transparent;
    }
    .chip--verified { color: var(--moss); border-color: var(--moss); }
    .chip-dot {
      width: 6px; height: 6px; border-radius: 50%; background: var(--moss);
    }

    .preview-stamp {
      position: absolute;
      top: -12px; right: -10px;
      font-family: var(--font-body);
      font-size: var(--text-xs);
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--ink);
      background: var(--mustard);
      padding: 5px 14px;
      border-radius: 100px;
      pointer-events: none;
      z-index: 2;
      box-shadow: 0 2px 8px rgba(30,29,24,0.18);
    }

    /* ─── Section frame ─── */
    .section { padding: clamp(72px, 11vw, 132px) 0; }
    .section--stone { background: var(--paper-deep); }
    .section-head {
      display: grid;
      grid-template-columns: minmax(0, 1fr);
      gap: 14px;
      margin-bottom: clamp(40px, 6vw, 68px);
      max-width: 880px;
    }
    .section-head__title {
      font-family: var(--font-display);
      font-weight: 300;
      font-size: clamp(var(--text-3xl), 3.8vw, var(--text-5xl));
      line-height: 1.04;
      letter-spacing: -0.035em;
      color: var(--ink);
    }
    .section-head__title em { font-style: italic; font-weight: 400; color: var(--moss); }
    .section-head__sub {
      font-size: clamp(16px, 1.2vw, 18px);
      line-height: 1.55;
      color: var(--ink-soft);
      max-width: 60ch;
    }

    /* ─── Why Organic ─── */
    .why-feature {
      display: grid;
      grid-template-columns: minmax(0, 0.95fr) minmax(0, 1.05fr);
      gap: 64px;
      align-items: center;
      margin-bottom: 64px;
    }
    .why-feature__media {
      position: relative;
      aspect-ratio: 5 / 4;
      overflow: hidden;
      background: linear-gradient(135deg, var(--ink), #3D3B32);
      border-radius: 12px;
    }
    .why-feature__img {
      position: absolute; inset: 0;
      width: 100%; height: 100%;
      object-fit: cover;
      filter: contrast(1.08) brightness(0.94);
      opacity: 0.95;
    }
    .why-feature__media-tint {
      position: absolute; inset: 0;
      background: #31423520;
      mix-blend-mode: color;
      pointer-events: none;
    }
    .why-feature__media-overlay {
      position: absolute; inset: 0;
      background: linear-gradient(180deg, transparent 50%, #2c2c2c99 100%);
      pointer-events: none;
    }
    .why-feature__media-tag {
      position: absolute;
      left: 24px; bottom: 20px;
      font-family: var(--font-mix); font-style: italic; font-size: var(--text-sm);
      color: var(--paper);
    }
    .why-feature__media-stamp {
      position: absolute;
      top: 20px; right: 20px;
      font-family: var(--font-mono);
      font-size: var(--text-xs);
      letter-spacing: 0;
      color: var(--ink);
      background: var(--paper);
      padding: 5px 9px;
      border: 1px solid var(--ink);
    }
    .why-feature__num {
      font-family: var(--font-mix); font-style: italic;
      font-size: var(--text-base);
      color: var(--olive-brown);
      margin-bottom: var(--space-3);
    }
    .why-feature__title {
      font-family: var(--font-display);
      font-weight: 300;
      font-size: clamp(var(--text-3xl), 3.4vw, var(--text-4xl));
      line-height: 1.06;
      letter-spacing: -0.03em;
      color: var(--ink);
      margin-bottom: var(--space-5);
    }
    .why-feature__title em { font-style: italic; font-weight: 500; color: var(--moss); }
    .why-feature__body {
      font-size: var(--text-md);
      line-height: 1.55;
      color: var(--ink-soft);
      max-width: 52ch;
      margin-bottom: 12px;
    }
    .why-feature__body + .why-feature__body { margin-top: 0; }

    .why-supporting {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 0;
      border-top: 1px solid var(--border);
    }
    .why-support {
      padding: 36px 32px 32px 0;
      border-right: 1px solid var(--border);
      display: flex; flex-direction: column; gap: 10px;
    }
    .why-support:nth-child(2) { padding-left: 32px; }
    .why-support:nth-child(3) { padding-left: 32px; border-right: none; padding-right: 0; }
    .why-support__num {
      font-family: var(--font-mix); font-style: italic;
      font-size: var(--text-sm);
      color: var(--ink-soft);
    }
    .why-support__title {
      font-family: var(--font-display);
      font-weight: 300;
      font-size: clamp(var(--text-xl), 1.8vw, var(--text-2xl));
      line-height: 1.1;
      letter-spacing: -0.022em;
      color: var(--ink);
    }
    .why-support__title em { font-style: italic; font-weight: 500; color: var(--moss); }
    .why-support__body {
      font-size: var(--text-base);
      line-height: 1.55;
      color: var(--ink-soft);
      max-width: 38ch;
    }

    /* ─── Pipeline ─── */
    .pipeline-flow {
      position: relative;
      display: grid;
      grid-template-columns: repeat(7, minmax(0, 1fr));
      gap: 0;
      margin-top: 24px;
    }
    .pipeline-flow::before {
      content: "";
      position: absolute;
      top: 22px;
      left: calc(100% / 14);
      right: calc(100% / 14);
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--moss) 8%, var(--moss) 92%, transparent);
    }
    .pipeline-node { display: flex; flex-direction: column; align-items: center; text-align: center; padding: 0 12px; gap: 14px; }
    .pipeline-node__dot {
      width: 44px; height: 44px;
      display: flex; align-items: center; justify-content: center;
      background: var(--paper);
      border: 1px solid var(--ink);
      color: var(--ink);
      font-family: var(--font-mix);
      font-style: italic;
      font-size: var(--text-md);
      border-radius: 50%;
      position: relative;
      z-index: 1;
    }
    .pipeline-node:first-child .pipeline-node__dot { background: var(--mustard); color: var(--ink); border-color: var(--mustard); }
    .pipeline-node:last-child .pipeline-node__dot  { background: var(--mustard); color: var(--ink); border-color: var(--mustard); }
    .pipeline-node__name {
      font-family: var(--font-display);
      font-weight: 400;
      font-size: var(--text-lg);
      letter-spacing: -0.015em;
      color: var(--ink);
    }
    .pipeline-node__chip {
      font-family: var(--font-mono);
      font-size: var(--text-xs);
      color: var(--ink-soft);
      letter-spacing: 0;
    }

    /* ─── Before / After ─── */
    .ba { position: relative; overflow: hidden; border: 1px solid var(--border); background: var(--paper); }
    .ba-side { padding: clamp(36px, 5vw, 60px); min-height: 320px; }
    .ba-after { background: var(--paper); }
    .ba-before-wrap {
      position: absolute; top: 0; left: 0; height: 100%;

    function romanize(n) {

    /* ─── Before / After ─── */
    function BeforeAfter() {
      const [pos, setPos] = useState(50);
      const [w, setW] = useState(0);
      const containerRef = useRef(null);
      const dragging = useRef(false);

      const handleMove = useCallback((clientX) => {
        if (!dragging.current || !containerRef.current) return;
        const rect = containerRef.current.getBoundingClientRect();
        const x = clientX - rect.left;
        const pct = Math.max(0, Math.min(100, (x / rect.width) * 100));
        setPos(pct);
      }, []);

      useEffect(() => {
        const el = containerRef.current;
        if (!el) return;
        const ro = new ResizeObserver(entries => {
          for (const entry of entries) setW(entry.contentRect.width);
        });
        ro.observe(el);
        setW(el.offsetWidth);
        return () => ro.disconnect();
      }, []);

      useEffect(() => {
        const onMouseMove = (e) => handleMove(e.clientX);
        const onTouchMove = (e) => handleMove(e.touches[0].clientX);
        const onUp = () => { dragging.current = false; };
        document.addEventListener('mousemove', onMouseMove);
        document.addEventListener('touchmove', onTouchMove);
        document.addEventListener('mouseup', onUp);
        document.addEventListener('touchend', onUp);
        return () => {
          document.removeEventListener('mousemove', onMouseMove);
          document.removeEventListener('touchmove', onTouchMove);
          document.removeEventListener('mouseup', onUp);
          document.removeEventListener('touchend', onUp);
        };
      }, [handleMove]);

      const beforeTags = ['"dive in"', '"landscape"', '"crucial"', 'no data', 'no citations'];
      const afterTags  = ['22% cost drop', '47-day permits', 'WA-specific', 'cited', '2023 anchor', 'FAQ schema'];

      return (
        <section className="section section--stone" id="beforeafter">
          <div className="container">
            <div className="section-head">
              <h2 className="section-head__title">
                Raw GPT, then <em>Organic.</em>
              </h2>
              <p className="section-head__sub">
                The same prompt, run through a vanilla writing model versus the Organic pipeline. Drag the divider.
              </p>
            </div>
            <div className="ba" ref={containerRef}>
              <div className="ba-side ba-after">
                <div className="ba-label ba-label--after">
                  <span className="live-dot" />
                  After, Organic
                </div>
                <p className="ba-text ba-text--after">
                  Residential solar installations in Washington dropped 22% in cost since 2023, but permitting now averages 47 days. King County homeowners face the longest waits. Here is what the data shows and how to clear it.
                </p>
                <div className="ba-tags">
                  {afterTags.map(t => <span className="ba-tag ba-tag--verified" key={t}>{t}</span>)}
                </div>
              </div>

              <div className="ba-before-wrap" style={{ width: `${pos}%` }}>
                <div className="ba-before" style={{ width: w || '100%' }}>
                  <div className="ba-label">Before, raw GPT</div>
                  <p className="ba-text ba-text--before">
                    Solar energy is an important pathway for homeowners looking to reduce their electricity bills. In an ever-evolving landscape, it is crucial to dive in and understand the nuances of going solar. Many experts agree that harnessing the power of the sun is a game-changer for sustainable living.
                  </p>
                  <div className="ba-tags">
                    {beforeTags.map(t => <span className="ba-tag ba-tag--muted" key={t}>{t}</span>)}
                  </div>
                </div>
              </div>

              <div className="ba-handle" style={{ left: `${pos}%` }}>
                <div className="ba-knob">
                  <svg width="16" height="16" viewBox="0 0 16 16" fill="none" aria-hidden="true">
                    <path d="M5 3L2 8L5 13" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round" />
                    <path d="M11 3L14 8L11 13" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round" />
                  </svg>
                </div>
              </div>
              <div
                className="ba-knob-area"
                style={{ left: `calc(${pos}% - 40px)` }}
                onMouseDown={() => { dragging.current = true; }}
                onTouchStart={() => { dragging.current = true; }}
                role="separator"
                aria-orientation="vertical"
                aria-label="Compare before and after"
                aria-valuenow={Math.round(pos)}
                aria-valuemin={0}
                aria-valuemax={100}
                tabIndex={0}
                onKeyDown={(e) => {
                  if (e.key === 'ArrowLeft') setPos(p => Math.max(0, p - 5));
                  if (e.key === 'ArrowRight') setPos(p => Math.min(100, p + 5));
                }}
              />
            </div>
          </div>
        </section>
      );
    }

    /* ─── Pricing ─── */
    const TIERS = [
      {
        name: 'Starter',
        price: '$99',
        period: '/month',
        per: '$3.96 per article',
        featured: false,
        badge: null,
        features: ['25 articles / month', '$3.50 per extra article', 'Solo use', 'Content clusters, overlap detection', 'Brand import from URL'],
      },
      {
        name: 'Standard',
        price: '$299',
        period: '/month',
        per: '$3.74 per article',
        featured: true,
        badge: 'most teams',
        features: ['80 articles / month', '$3.00 per extra article', '3 team seats, $25 each beyond', 'Visual style extraction, model bake-off', 'API, MCP server, webhooks'],
      },
      {
        name: 'Scale',
        price: '$999',
        period: '/month',
        per: '$3.33 per article',
        featured: false,
        badge: null,
        features: ['300 articles / month', '$2.50 per extra article', '10 team seats, $20 each beyond', 'Unlimited brands, custom prompt templates', 'Priority support, dedicated onboarding'],
      },
    ];

    function Pricing({ onStart }) {
      return (
        <section className="section" id="pricing">
          <div className="container">
            <div className="section-head">
              <h2 className="section-head__title">
                Three plans. <em>No per-word billing.</em>
              </h2>
              <p className="section-head__sub">
                Pricing is by the article, with a flat overage rate. No tokens to count, no surprises at the end of the month.
              </p>
            </div>
            <div className="pricing-grid">
              {TIERS.map(t => (
                <div className={`tier ${t.featured ? 'tier--featured' : ''}`} key={t.name}>
                  <div className="tier__name">
                    {t.name}
                    {t.badge && <span className="tier__badge">{t.badge}</span>}
                  </div>
                  <div className="tier__price">{t.price}</div>
                  <div className="tier__period">{t.period}</div>
                  <div className="tier__per">{t.per}</div>
                  <ul className="tier__features">
                    {t.features.map(f => <li className="tier__feature" key={f}>{f}</li>)}
                  </ul>
                  <div className="tier__cta">
                    <button className={`btn ${t.featured ? 'btn--paper' : 'btn--ink'}`} onClick={onStart}>
                      Start free <span className="btn-arrow">↗</span>
                    </button>
                  </div>
                </div>
              ))}
            </div>
          </div>
        </section>
      );
    }

    /* ─── Final CTA ─── */
    function FinalCTA({ onStart }) {
      return (
        <section className="final-cta">
          <div className="container">
            <h2 className="final-cta-headline">
              Less AI.<br /> <em>More Organic.</em>
            </h2>
            <p className="final-cta-lede">
              Import your brand. Generate your first cluster. Publish in minutes.
            </p>
            <button className="btn btn--paper" onClick={onStart}>
              Start free <span className="btn-arrow">↗</span>
            </button>
          </div>
        </section>
      );
    }

    /* ─── Footer ─── */
    function Footer() {
      return (
        <footer className="footer">
          <div className="container">
            <div className="footer-inner">
              <div className="footer-left">© Organic, Inc. A PSL company.</div>
              <div className="footer-right">
                <a href="docs.html" className="footer-link">Docs</a>
                <a href="changelog.html" className="footer-link">Changelog</a>
                <a href="docs.html#mcp" className="footer-link">MCP server</a>
                <a href="/privacy" className="footer-link">Privacy</a>
              </div>
            </div>
          </div>
        </footer>
      );
    }

    /* ─── Modal ─── */
    function StartModal({ open, onClose }) {
      const [email, setEmail] = useState('');
      const [submitting, setSubmitting] = useState(false);
      const [submitted, setSubmitted] = useState(false);
      const [error, setError] = useState(null);

      useEffect(() => {
        if (!open) {
          const t = setTimeout(() => {
            setEmail(''); setSubmitted(false); setError(null);
          }, 300);
          return () => clearTimeout(t);
        }
      }, [open]);

      useEffect(() => {
        if (!open) return;
        const onKey = (e) => { if (e.key === 'Escape') onClose(); };
        window.addEventListener('keydown', onKey);
        return () => window.removeEventListener('keydown', onKey);
      }, [open, onClose]);

      async function onSubmit(e) {
        e.preventDefault();
        if (!email.trim() || submitting) return;

        if (email.trim().toUpperCase() === 'GO') {
          localStorage.setItem('organic_gate_unlocked', 'true');
          const appUrl = window.location.protocol === 'file:' ? 'http://localhost:3001/studio' : '/studio';
          window.location.href = appUrl;
          return;
        }

        if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email.trim())) {
          setError('That email does not look right. Try a different one.');
          return;
        }

        setSubmitting(true);
        setError(null);
        try {
          const r = await fetch('/api/waitlist', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ email: email.trim() }),
          });
          const data = await r.json();
          if (!r.ok) throw new Error(data?.error || 'Something went wrong. Try again in a moment.');
          setSubmitted(true);
          localStorage.setItem('organic_gate_unlocked', 'true');
          setTimeout(() => { window.location.href = '/studio'; }, 1500);
        } catch (err) {
          setError(err.message);
        } finally {
          setSubmitting(false);
        }
      }

      if (!open) return null;

      return (
        <div className="modal-overlay" onClick={(e) => { if (e.target === e.currentTarget) onClose(); }}>
          <div className="modal-card">
            <button className="modal-close" onClick={onClose} aria-label="Close">×</button>

            {!submitted ? (
              <>
                <div className="modal-kicker">Start free</div>
                <h2 className="modal-title">
                  Spin up <em>your studio.</em>
                </h2>
                <p className="modal-subtitle">
                  Enter your email. We will set up your studio and open it in a moment. Cancel anytime in the first 7 days.
                </p>
                <form onSubmit={onSubmit}>
                  <input
                    type="email"
                    inputMode="email"
                    autoComplete="email"
                    spellCheck={false}
                    required
                    className="modal-input"
                    placeholder="you@company.com"
                    value={email}
                    onChange={(e) => setEmail(e.target.value)}
                    autoFocus
                  />
                  <button type="submit" className="modal-submit" disabled={submitting || !email.trim()}>
                    {submitting ? 'Setting up…' : <>Open my studio <span className="btn-arrow">↗</span></>}
                  </button>
                </form>
                {error && <p className="modal-error">{error}</p>}
              </>
            ) : (
              <>
                <div className="modal-success-mark">✓</div>
                <h2 className="modal-title">
                  Your studio is <em>opening.</em>
                </h2>
                <p className="modal-subtitle" style={{ marginBottom: 0 }}>
                  Sit tight for a second. We're routing you in.
                </p>
              </>
            )}
          </div>
        </div>
      );
    }



    /* ─── App ─── */
    function App() {
      const [modalOpen, setModalOpen] = useState(false);
      const open  = useCallback(() => setModalOpen(true), []);
      const close = useCallback(() => setModalOpen(false), []);

      return (
        <>
          <Nav onStart={open} />
          <Hero onStart={open} />
          <WhyOrganic />
          <Pipeline />
          <BeforeAfter />
          <Pricing onStart={open} />
          <FinalCTA onStart={open} />
          <Footer />
          <StartModal open={modalOpen} onClose={close} />
        </>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
